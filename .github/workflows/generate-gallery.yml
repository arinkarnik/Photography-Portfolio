name: Auto Generate Photo Gallery List

on:
  push:
    paths:
      - 'images/**'
      - 'tabs.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Gallery JSON
        run: |
          echo "{" > gallery.json
          first_folder=true
          
          # Loop through each subdirectory inside images
          for dir in images/*/; do
            if [ -d "$dir" ]; then
              folder_name=$(basename "$dir")
              
              if [ "$first_folder" = true ]; then
                first_folder=false
              else
                echo "," >> gallery.json
              fi
              
              echo "  \"$folder_name\": [" >> gallery.json
              
              first_file=true
              # Find webp, jpg, png variations
              find "$dir" -type f \( -iname "*.webp" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | sort | while read -r file; do
                if [ "$first_file" = true ]; then
                  first_file=false
                else
                  echo "," >> gallery.json
                fi
                clean_path=$(echo "$file" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
                echo "    \"$clean_path\"" >> gallery.json
              done
              
              echo "  ]" >> gallery.json
            fi
          done
          
          echo "}" >> gallery.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery.json
          git diff-index --quiet HEAD || git commit -m "Automated gallery update"
          git push