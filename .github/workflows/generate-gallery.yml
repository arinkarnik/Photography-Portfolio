name: Auto Generate Photo Gallery List and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - 'images/**'
      - 'tabs.json'
      - 'index.html'
      - 'styles.css'
      - 'script.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Gallery JSON
        run: |
          echo "{" > gallery.json
          first_folder=true
          for dir in images/*/; do
            if [ -d "$dir" ]; then
              folder_name=$(basename "$dir")
              if [ "$first_folder" = true ]; then
                first_folder=false
              else
                echo "," >> gallery.json
              fi
              echo "  \"$folder_name\": [" >> gallery.json
              first_file=true
              find "$dir" -type f \( -iname "*.webp" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | sort | while read -r file; do
                if [ "$first_file" = true ]; then
                  first_file=false
                else
                  echo "," >> gallery.json
                fi
                clean_path=$(echo "$file" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
                echo "    \"$clean_path\"" >> gallery.json
              done
              echo "  ]" >> gallery.json
            fi
          done
          echo "}" >> gallery.json

      - name: Disable Jekyll Compiler
        run: touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4